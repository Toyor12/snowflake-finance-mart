version: 2

models:
  - name: dim_customer
    columns:
      - name: customer_id
        tests: [not_null, unique]
  - name: dim_product
    columns:
      - name: product_id
        tests: [not_null, unique]
  - name: dim_date
    columns:
      - name: date_day
        tests: [not_null, unique]
  - name: fct_sales
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [order_id, order_item_id]
    columns:
      - name: product_id
        tests:
          - relationships:
              to: ref('dim_product')
              field: product_id
      - name: customer_id
        tests:
          - relationships:
              to: ref('dim_customer')
              field: customer_id
  - name: fct_revenue
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: gross_order_value
        tests: [not_null]
