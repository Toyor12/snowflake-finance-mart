version: 2

models:
  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'created', 'approved', 'unavailable']
  - name: stg_order_items
    columns:
      - name: order_id
        tests: [not_null]
      - name: price
        tests: [not_null]
  - name: stg_customers
    columns:
      - name: customer_id
        tests: [not_null, unique]
  - name: stg_products
    columns:
      - name: product_id
        tests: [not_null, unique]
  - name: stg_payments
    columns:
      - name: order_id
        tests: [not_null]
